# idea-analyzer · reverse-proxy vhost.
# Drop in the shared nginx conf dir (/srv/infra/reverse-proxy/conf/ideias.conf),
# then: docker exec reverse-proxy nginx -t && docker exec reverse-proxy nginx -s reload
# Container `ideias-app` is reachable by name on proxy_net.

server {
    listen 80;
    listen [::]:80;
    server_name ideias.berrysystem.com.br;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name ideias.berrysystem.com.br;

    ssl_certificate     /etc/letsencrypt/live/ideias.berrysystem.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ideias.berrysystem.com.br/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $ideias_app http://ideias-app:4500;
        proxy_pass         $ideias_app;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 2m;
        proxy_send_timeout 2m;
        client_max_body_size 5m;
    }
}
